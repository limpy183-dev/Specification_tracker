<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive A-Level specification checklist with traffic light knowledge rating for AQA Computer Science, OCR Physics, and OCR Geography." />
  <title>SpecTracker — A-Level Revision Checklist</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <h1>🎯 SpecTracker</h1>
      <p class="subtitle">Rate your knowledge. Track your revision. Ace your exams.</p>
    </header>

    <!-- Subject Tabs -->
    <nav class="subject-tabs" id="subject-tabs" role="tablist"></nav>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search topics..." autocomplete="off" />
      </div>
      <div class="filter-pills" id="filter-pills">
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="red">🔴 Red</button>
        <button class="filter-pill" data-filter="yellow">🟡 Yellow</button>
        <button class="filter-pill" data-filter="green">🟢 Green</button>
        <button class="filter-pill" data-filter="unrated">⚪ Unrated</button>
      </div>
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
        🌙
        <span class="tooltip">Toggle theme</span>
      </button>
      <button class="icon-btn" id="expand-all-btn" aria-label="Expand all sections">
        📂
        <span class="tooltip">Expand all</span>
      </button>
      <button class="icon-btn" id="collapse-all-btn" aria-label="Collapse all sections">
        📁
        <span class="tooltip">Collapse all</span>
      </button>
    </div>

    <!-- Progress Overview -->
    <div class="progress-card" id="progress-card">
      <h2>📊 Overall Progress</h2>
      <div class="progress-stats" id="progress-stats"></div>
      <div class="progress-bar-container" id="progress-bar"></div>
    </div>

    <!-- Topic Sections (rendered by JS) -->
    <main id="sections-container"></main>
  </div>

  <!-- Footer Actions -->
  <footer class="footer-actions" id="footer-actions">
    <button class="btn primary" id="btn-export-json">
      💾 Export JSON
    </button>
    <button class="btn" id="btn-export-csv">
      📄 Export CSV
    </button>
    <button class="btn" id="btn-import">
      📥 Import
    </button>
    <input type="file" id="import-file" accept=".json" style="display:none" />
    <button class="btn" id="btn-print">
      🖨️ Print
    </button>
    <button class="btn danger" id="btn-reset">
      🗑️ Reset All
    </button>
  </footer>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <h3 id="modal-title">Are you sure?</h3>
      <p id="modal-message">This will clear all your ratings and notes. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn" id="modal-cancel">Cancel</button>
        <button class="btn danger" id="modal-confirm">Reset</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Celebration Container -->
  <div id="celebration-container"></div>

  <script src="animations_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
